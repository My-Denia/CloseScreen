name: Publish release to WinGet

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag that would be published to WinGet"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-disabled:
    runs-on: ubuntu-latest
    steps:
      - name: WinGet publishing disabled for fork takeover
        run: |
          echo "TODO: Re-enable after the maintainer confirms the new WinGet package identifier and token."
          echo "WinGet publishing is disabled for this fork takeover."
          echo "No package-manager submission is performed by this workflow."
