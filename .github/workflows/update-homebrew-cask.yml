name: Update Homebrew Cask

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag that would be published to a cask"
        required: true
        type: string

permissions:
  contents: read

jobs:
  update-cask-disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Homebrew cask publishing disabled for fork takeover
        run: |
          echo "TODO: Re-enable after the maintainer confirms the new Homebrew tap/cask identifiers and token."
          echo "Homebrew cask publishing is disabled for this fork takeover."
          echo "No tap checkout, commit, or push is performed by this workflow."
