name: Build Electron App

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache the downloaded caption model so we don't re-fetch from HuggingFace every run.
      - name: Cache caption assets
        uses: actions/cache@v5
        with:
          path: caption-assets
          key: caption-assets-${{ hashFiles('scripts/fetch-caption-model.mjs') }}

      - name: Build native Windows helpers
        run: npm run build:native:win

      - name: Build Vite output
        run: npm run build-vite

      - name: Package Windows installer
        run: npx electron-builder --win --config.npmRebuild=false --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload Windows build
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: release/**/*.exe
          if-no-files-found: error
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # bsdtar (from libarchive-tools) is required by fpm to build pacman packages.
      - name: Install pacman build dependencies
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Cache caption assets
        uses: actions/cache@v5
        with:
          path: caption-assets
          key: caption-assets-${{ hashFiles('scripts/fetch-caption-model.mjs') }}

      - name: Build Vite output
        run: npm run build-vite

      - name: Package Linux installers
        run: npx electron-builder --linux AppImage deb pacman --config.npmRebuild=false --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload Linux build
        uses: actions/upload-artifact@v7
        with:
          name: linux-installer
          path: |
            release/**/*.AppImage
            release/**/*.zsync
            release/**/*.deb
            release/**/*.pacman
          if-no-files-found: error
          retention-days: 30
