name: Build Electron App

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "macOS architecture to build when macOS is enabled"
        required: true
        default: "both"
        type: choice
        options:
          - arm64
          - x64
          - both
      build_macos:
        description: "Also build macOS artifacts"
        required: true
        default: false
        type: boolean

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache the downloaded caption model so we don't re-fetch from HuggingFace every run.
      - name: Cache caption assets
        uses: actions/cache@v4
        with:
          path: caption-assets
          key: caption-assets-${{ hashFiles('scripts/fetch-caption-model.mjs') }}

      - name: Build native Windows helpers
        run: npm run build:native:win

      - name: Build Vite output
        run: npm run build-vite

      - name: Package Windows installer
        run: npx electron-builder --win --config.npmRebuild=false --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/**/*.exe
          if-no-files-found: error
          retention-days: 30

  build-macos:
    if: ${{ inputs.build_macos }}
    runs-on: macos-latest
    strategy:
      matrix:
        arch: ${{ inputs.arch == 'both' && fromJSON('["arm64", "x64"]') || fromJSON(format('["{0}"]', inputs.arch)) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Ensure sharp prebuilt
        run: npm rebuild sharp
        env:
          npm_config_build_from_source: "false"

      - name: Cache caption assets
        uses: actions/cache@v4
        with:
          path: caption-assets
          key: caption-assets-${{ hashFiles('scripts/fetch-caption-model.mjs') }}

      - name: Resolve macOS signing mode
        id: mac_signing
        env:
          MAC_CERTIFICATE_P12: ${{ secrets.MAC_CERTIFICATE_P12 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          MAC_SIGNING_IDENTITY: ${{ secrets.MAC_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -n "$MAC_CERTIFICATE_P12" && -n "$MAC_CERTIFICATE_PASSWORD" && -n "$MAC_SIGNING_IDENTITY" ]]; then
            echo "signing_enabled=true" >> "$GITHUB_OUTPUT"
            echo "macOS signing secrets found; signed packaging will run."
          else
            echo "signing_enabled=false" >> "$GITHUB_OUTPUT"
            echo "macOS signing secrets are incomplete; unsigned packaging will run."
          fi

          if [[ -n "$APPLE_ID" && -n "$APPLE_TEAM_ID" && -n "$APPLE_APP_SPECIFIC_PASSWORD" ]]; then
            echo "notarization_enabled=true" >> "$GITHUB_OUTPUT"
            echo "macOS notarization secrets found; notarization will run after signing."
          else
            echo "notarization_enabled=false" >> "$GITHUB_OUTPUT"
            echo "macOS notarization secrets are incomplete; notarization will be skipped."
          fi

      - name: Import code signing certificate
        if: ${{ steps.mac_signing.outputs.signing_enabled == 'true' }}
        env:
          MAC_CERTIFICATE_P12: ${{ secrets.MAC_CERTIFICATE_P12 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$MAC_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$MAC_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/certificate.p12"

      - name: Build Vite output
        run: npm run build-vite

      - name: Build native macOS helpers
        run: npm run build:native:mac
        env:
          OPENSCREEN_MAC_HELPER_ARCHS: ${{ matrix.arch }}

      - name: Package .app bundle
        run: npx electron-builder --mac --${{ matrix.arch }} --dir --publish never
        env:
          CSC_NAME: ${{ secrets.MAC_SIGNING_IDENTITY }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ steps.mac_signing.outputs.signing_enabled == 'true' && 'true' || 'false' }}

      - name: Get package metadata
        id: package_meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          PRODUCT_NAME=$(node -e 'const fs=require("fs"); const text=fs.readFileSync("electron-builder.json5","utf8"); const match=text.match(/"productName"\s*:\s*"([^"]+)"/); console.log(match ? match[1] : "openscreen");')
          echo "product_name=$PRODUCT_NAME" >> "$GITHUB_OUTPUT"

      - name: Find .app bundle
        id: find_app
        run: |
          set -euo pipefail
          VERSION="${{ steps.package_meta.outputs.version }}"
          echo "=== Release directory contents ==="
          ls -laR "release/${VERSION}/" || echo "release/${VERSION}/ not found"
          echo "=== Searching for .app bundle ==="
          APP_BUNDLE=$(find "release/${VERSION}" -maxdepth 4 -name "*.app" -type d | head -n1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "::error::No .app bundle found in release/${VERSION}/"
            exit 1
          fi
          echo "app_bundle=$APP_BUNDLE" >> "$GITHUB_OUTPUT"
          echo "Found: $APP_BUNDLE"

      - name: Verify .app code signature
        if: ${{ steps.mac_signing.outputs.signing_enabled == 'true' }}
        run: codesign --verify --deep --strict "${{ steps.find_app.outputs.app_bundle }}"

      - name: Create DMG
        id: dmg
        run: |
          set -euo pipefail
          VERSION="${{ steps.package_meta.outputs.version }}"
          PRODUCT_NAME="${{ steps.package_meta.outputs.product_name }}"
          ARCH="${{ matrix.arch }}"
          DMG_NAME="${PRODUCT_NAME}-Mac-${ARCH}-${VERSION}.dmg"
          RELEASE_DIR="release/${VERSION}"
          DMG_OUTPUT="${RELEASE_DIR}/${DMG_NAME}"
          STAGING="${RELEASE_DIR}/dmg-staging"

          mkdir -p "$STAGING"
          cp -R "${{ steps.find_app.outputs.app_bundle }}" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -srcfolder "$STAGING" \
            -volname "$PRODUCT_NAME" \
            -fs HFS+ \
            -fsargs "-c c=64,a=16,e=16" \
            -format UDBZ \
            "$DMG_OUTPUT"

          rm -rf "$STAGING"

          echo "dmg_path=$DMG_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"

      - name: Sign DMG
        if: ${{ steps.mac_signing.outputs.signing_enabled == 'true' }}
        env:
          MAC_SIGNING_IDENTITY: ${{ secrets.MAC_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          codesign --force \
            --sign "$MAC_SIGNING_IDENTITY" \
            --timestamp \
            "${{ steps.dmg.outputs.dmg_path }}"

      - name: Notarize DMG
        if: ${{ steps.mac_signing.outputs.signing_enabled == 'true' && steps.mac_signing.outputs.notarization_enabled == 'true' }}
        run: |
          set -euo pipefail
          xcrun notarytool submit "${{ steps.dmg.outputs.dmg_path }}" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
            --wait
        timeout-minutes: 15

      - name: Staple notarization ticket
        if: ${{ steps.mac_signing.outputs.signing_enabled == 'true' && steps.mac_signing.outputs.notarization_enabled == 'true' }}
        run: xcrun stapler staple "${{ steps.dmg.outputs.dmg_path }}"

      - name: Validate stapled DMG
        if: ${{ steps.mac_signing.outputs.signing_enabled == 'true' && steps.mac_signing.outputs.notarization_enabled == 'true' }}
        run: |
          set -euo pipefail
          xcrun stapler validate "${{ steps.dmg.outputs.dmg_path }}"
          spctl -a -vv -t install "${{ steps.dmg.outputs.dmg_path }}"

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer-${{ matrix.arch }}
          path: ${{ steps.dmg.outputs.dmg_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Cleanup keychain
        if: ${{ always() && steps.mac_signing.outputs.signing_enabled == 'true' }}
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # bsdtar (from libarchive-tools) is required by fpm to build pacman packages.
      - name: Install pacman build dependencies
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Cache caption assets
        uses: actions/cache@v4
        with:
          path: caption-assets
          key: caption-assets-${{ hashFiles('scripts/fetch-caption-model.mjs') }}

      - name: Build Vite output
        run: npm run build-vite

      - name: Package Linux installers
        run: npx electron-builder --linux AppImage deb pacman --config.npmRebuild=false --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: |
            release/**/*.AppImage
            release/**/*.zsync
            release/**/*.deb
            release/**/*.pacman
          if-no-files-found: error
          retention-days: 30
