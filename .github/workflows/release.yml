name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache caption assets
        uses: actions/cache@v4
        with:
          path: caption-assets
          key: caption-assets-${{ hashFiles('scripts/fetch-caption-model.mjs') }}

      - name: Build native Windows helpers
        run: npm run build:native:win

      - name: Build Vite output
        run: npm run build-vite

      - name: Package Windows installer
        run: npx electron-builder --win --config.npmRebuild=false --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/**/*.exe
          if-no-files-found: error
          retention-days: 30

  build-linux:
    name: Build Linux Installers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install pacman build dependencies
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Cache caption assets
        uses: actions/cache@v4
        with:
          path: caption-assets
          key: caption-assets-${{ hashFiles('scripts/fetch-caption-model.mjs') }}

      - name: Build Vite output
        run: npm run build-vite

      - name: Package Linux installers
        run: npx electron-builder --linux AppImage deb pacman --config.npmRebuild=false --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload Linux installers
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.pacman
          if-no-files-found: error
          retention-days: 30

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-windows
      - build-linux
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/windows-installer/**/*.exe
            artifacts/linux-installers/**/*.AppImage
            artifacts/linux-installers/**/*.deb
            artifacts/linux-installers/**/*.pacman
